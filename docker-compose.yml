services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: voidlink
      POSTGRES_PASSWORD: voidlink
      POSTGRES_DB: voidlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://voidlink:voidlink@postgres:5432/voidlink
      CORS_ORIGINS: http://localhost:5173,http://localhost:1420
    depends_on:
      - postgres

volumes:
  pgdata:
